amcl:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: /scan

    set_initial_pose: True
    initial_pose: [7.04, 10.5, 0.0, 0.0]

    max_particles: 2000
    min_particles: 500
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    tf_broadcast: true
    transform_tolerance: 1.0

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    update_min_d: 0.15
    update_min_a: 0.15
    resample_interval: 1

    laser_model_type: "likelihood_field"
    laser_max_range: 12.0
    laser_min_range: 0.4
    laser_likelihood_max_dist: 2.0
    max_beams: 60

    do_beamskip: false


bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    default_server_timeout: 20

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node


controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08
      movement_time_allowance: 20.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.22
      yaw_goal_tolerance: 0.60


    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.30
      lookahead_dist: 0.45
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.70
      lookahead_time: 1.2

      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2

      min_approach_linear_velocity: 0.06
      approach_velocity_scaling_dist: 0.8

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.8

      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.7
      regulated_linear_scaling_min_speed: 0.08

      cost_scaling_dist: 0.55
      cost_scaling_gain: 1.5

      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.5
      rotate_to_heading_min_angle: 0.8
      max_angular_accel: 1.5

      allow_reversing: false

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0

    scale_velocities: False
    feedback: "OPEN_LOOP"

    max_velocity: [0.6, 0.0, 1.2]
    min_velocity: [-0.2, 0.0, -1.2]

    max_accel: [0.8, 0.0, 1.5]
    max_decel: [-0.8, 0.0, -1.5]

    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: False
      allow_unknown: False
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      cost_travel_multiplier: 3.0
      use_final_approach_orientation: false
      smooth_path: true


smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True


local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0

      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: True

      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      footprint: "[[0.42, 0.25], [0.42, -0.25], [-0.42, -0.25], [-0.42, 0.25]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan

        scan:
          topic: /scan
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          max_obstacle_height: 0.6
          min_obstacle_height: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50
        cost_scaling_factor: 4.0

      always_send_full_costmap: True


global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0

      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: True

      resolution: 0.05
      track_unknown_space: true

      footprint: "[[0.42, 0.25], [0.42, -0.25], [-0.42, -0.25], [-0.42, 0.25]]"

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: True
        subscribe_to_updates: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan

        scan:
          topic: /scan
          clearing: True
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          max_obstacle_height: 0.6
          min_obstacle_height: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.50
        cost_scaling_factor: 4.0

      always_send_full_costmap: True


behavior_server:
  ros__parameters:
    use_sim_time: True
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"

    backup:
      plugin: "nav2_behaviors/BackUp"

    wait:
      plugin: "nav2_behaviors/Wait"


map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "/home/bo/amr_ws/my_warehouse_map_clean.yaml"


waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart: True

    node_names:
      - map_server
      - amcl
      - planner_server
      - smoother_server
      - controller_server
      - velocity_smoother
      - behavior_server
      - bt_navigator
      - waypoint_follower